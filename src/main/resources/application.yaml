server:
  port: 7555

spring:
  application:
    name: Vyntra-ApiGatway
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      routes:
        - id: bff-vyntra
          uri: lb://BffVyntra
          predicates:
            - Path=/api/v1/auth/**, /api/v2/auth/**
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/products/**
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/orders/**, /api/v1/abc/**
        - id: payment-service
          uri: lb://Vyntra-Payment-Service
          predicates:
            - Path=/api/v1/payments/**
        - id: inventory-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/inventory/**, /api/v1/stock/**, /api/v2/stock/**
        - id: home-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/home/**,

