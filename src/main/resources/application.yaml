server:
  port: 7555

spring:
  application:
    name: X-ApiGateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      routes:
        - id: bff-vyntra
          uri: ${BFF_SERVICE_URL:http://localhost:8443}
          predicates:
            - Path=/api/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@clientRateLimitKeyResolver}"
                redis-rate-limiter.replenishRate: ${GATEWAY_RATE_LIMIT_REPLENISH_RATE:50}
                redis-rate-limiter.burstCapacity: ${GATEWAY_RATE_LIMIT_BURST_CAPACITY:100}
                redis-rate-limiter.requestedTokens: 1
