spring:
  config:
    activate:
      on-profile: production
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      routes:
        - id: x-bff
          uri: ${BFF_SERVICE_URL:http://localhost:8443}
          predicates:
            - Path=/api/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@clientRateLimitKeyResolver}"
                redis-rate-limiter.replenishRate: ${GATEWAY_RATE_LIMIT_REPLENISH_RATE:50}
                redis-rate-limiter.burstCapacity: ${GATEWAY_RATE_LIMIT_BURST_CAPACITY:100}
                redis-rate-limiter.requestedTokens: 1

x:
  gateway:
    rate-limit:
      enabled: true
