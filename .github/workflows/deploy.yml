name: Build and deploy x-api-gateway
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: github-x-sharedlib
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
      - run: mvn --batch-mode --no-transfer-progress -DskipTests package
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/vathanaprogrammer/x-api-gateway:main
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.K3S_DEPLOY_HOST }}
          username: ${{ secrets.K3S_DEPLOY_USER }}
          key: ${{ secrets.K3S_SSH_KEY }}
          script: |
            sudo k3s kubectl -n x-platform create deployment x-api-gateway --image=ghcr.io/vathanaprogrammer/x-api-gateway:main --dry-run=client -o yaml | sudo k3s kubectl apply -f -
            sudo k3s kubectl -n x-platform expose deployment x-api-gateway --port=8080 --target-port=8080 --dry-run=client -o yaml | sudo k3s kubectl apply -f -
            sudo k3s kubectl -n x-platform set env deployment/x-api-gateway SERVER_PORT=8080 SPRING_PROFILES_ACTIVE=production SPRING_DATA_REDIS_HOST=redis.x-platform.svc.cluster.local SPRING_DATA_REDIS_PORT=6379
            sudo k3s kubectl -n x-platform rollout status deployment/x-api-gateway --timeout=180s
